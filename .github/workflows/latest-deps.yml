name: Test Latest Deps

on:
  schedule:
    - cron: '0 13 * * *' # daily at 1pm UTC
  workflow_dispatch:

jobs:
  test-latest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Update all dependencies
        run: go get -t -u ./...
      - name: Tidy
        run: go mod tidy
      - run: make
